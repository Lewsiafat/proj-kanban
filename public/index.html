<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Kanban</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --text: #e2e4f0;
    --text2: #7c82a0;
    --accent: #6366f1;
    --danger: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Board */
  .board { display: flex; gap: 16px; padding: 20px; overflow-x: auto; flex: 1; align-items: flex-start; }
  .board::-webkit-scrollbar { height: 6px; }
  .board::-webkit-scrollbar-track { background: transparent; }
  .board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Column */
  .col { min-width: 280px; max-width: 280px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; max-height: calc(100vh - 100px); transition: opacity .15s, box-shadow .15s; }
  .col.dragging { opacity: 0.35; }
  .col.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,.3); }
  .col-header { display: flex; align-items: center; gap: 8px; padding: 12px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .col-title { font-size: 13px; font-weight: 600; flex: 1; cursor: pointer; }
  .col-title:hover { color: var(--accent); }
  .col-count { font-size: 11px; color: var(--text2); background: var(--surface2); padding: 2px 7px; border-radius: 10px; }
  .col-actions { display: flex; gap: 4px; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 3px; border-radius: 4px; font-size: 14px; line-height: 1; }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }
  .drag-handle { background: none; border: none; cursor: grab; color: var(--text2); padding: 3px 4px; border-radius: 4px; font-size: 15px; line-height: 1; user-select: none; }
  .drag-handle:hover { color: var(--text); background: var(--surface2); }
  .drag-handle:active { cursor: grabbing; }

  /* Cards */
  .col-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: border-color .15s; }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .card-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .card-time { font-size: 11px; color: var(--text2); margin-left: auto; }
  .card-memo { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  .status-active    { background: rgba(99,102,241,.18); color: #818cf8; }
  .status-done      { background: rgba(34,197,94,.15); color: #4ade80; }
  .status-blocked   { background: rgba(239,68,68,.15); color: #f87171; }
  .status-pending   { background: rgba(245,158,11,.15); color: #fbbf24; }
  .status-archived  { background: rgba(124,130,160,.15); color: var(--text2); }

  /* Add card btn */
  .add-card-btn { display: flex; align-items: center; gap: 6px; padding: 8px 10px; margin: 6px 10px 10px; border-radius: 7px; border: 1px dashed var(--border); background: none; cursor: pointer; color: var(--text2); font-size: 12px; transition: all .15s; }
  .add-card-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,.05); }

  /* Add column */
  .add-col { min-width: 240px; max-width: 240px; display: flex; align-items: flex-start; padding-top: 2px; }
  .add-col-btn { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-radius: var(--radius); border: 1px dashed var(--border); background: rgba(255,255,255,.02); cursor: pointer; color: var(--text2); font-size: 13px; width: 100%; transition: all .15s; }
  .add-col-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,.06); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 440px; padding: 24px; }
  .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 90px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
  .color-opt.selected { border-color: #fff; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 200; animation: slideUp .2s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .hidden { display: none !important; }

  /* Footer */
  footer { display: flex; align-items: center; gap: 16px; padding: 8px 20px; border-top: 1px solid var(--border); flex-shrink: 0; font-size: 12px; color: var(--text2); }
  .footer-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(245,158,11,.15); color: #fbbf24; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
  .footer-ver { margin-left: auto; }
</style>
</head>
<body>

<header>
  <h1>📋 Project <span>Kanban</span></h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openProjectModal()">＋ 新增專案</button>
  </div>
</header>

<div class="board" id="board"></div>

<footer>
  <span>📋 Project Kanban</span>
  <span class="footer-badge" id="pendingBadge">🟡 待處理 0</span>
  <span class="footer-ver" id="footerVer">v1.0.0</span>
</footer>

<!-- Project Modal -->
<div class="modal-overlay hidden" id="projectModal">
  <div class="modal">
    <h2 id="projectModalTitle">新增專案</h2>
    <div class="form-group">
      <label>專案名稱</label>
      <input id="projectName" type="text" placeholder="例：MindVault v2" autofocus>
    </div>
    <div class="form-group">
      <label>顏色</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('projectModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="deleteProjectBtn" onclick="deleteCurrentProject()">刪除</button>
      <button class="btn btn-primary" onclick="saveProject()">儲存</button>
    </div>
  </div>
</div>

<!-- Card Modal -->
<div class="modal-overlay hidden" id="cardModal">
  <div class="modal">
    <h2 id="cardModalTitle">新增狀態更新</h2>
    <div class="form-group">
      <label>標題</label>
      <input id="cardTitle" type="text" placeholder="例：完成登入模組">
    </div>
    <div class="form-group">
      <label>備忘 memo</label>
      <textarea id="cardMemo" placeholder="詳細說明、連結、注意事項…"></textarea>
    </div>
    <div class="form-group">
      <label>狀態</label>
      <select id="cardStatus">
        <option value="active">🟣 進行中</option>
        <option value="pending">🟡 待處理</option>
        <option value="done">🟢 完成</option>
        <option value="blocked">🔴 卡住了</option>
        <option value="archived">⚪ 封存</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('cardModal')">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="deleteCardBtn" onclick="deleteCurrentCard()">刪除</button>
      <button class="btn btn-primary" onclick="saveCard()">儲存</button>
    </div>
  </div>
</div>

<script>
const BASE = window.location.pathname.replace(/\/$/, '')
const API  = BASE + '/api'

const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6','#f97316','#64748b']

let state = { projects: [] }
let editing = { type: null, id: null, projectId: null }

// ── API helpers ─────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  })
  if (!res.ok) throw new Error((await res.json()).error || 'Error')
  return res.json()
}

// ── Column order (localStorage) ─────────────────────────────
const ORDER_KEY = 'kanban-col-order'

function saveOrder() {
  localStorage.setItem(ORDER_KEY, JSON.stringify(state.projects.map(p => p.id)))
}

function applyOrder(projects) {
  try {
    const order = JSON.parse(localStorage.getItem(ORDER_KEY) || '[]')
    if (!order.length) return projects
    return [
      ...order.map(id => projects.find(p => p.id === id)).filter(Boolean),
      ...projects.filter(p => !order.includes(p.id))   // new projects go to end
    ]
  } catch { return projects }
}

// ── Load ────────────────────────────────────────────────────
async function load() {
  const raw = await api('GET', '/projects')
  state.projects = applyOrder(raw)
  render()
}

// ── Render ──────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board')
  board.innerHTML = ''

  state.projects.forEach(p => {
    const col = document.createElement('div')
    col.className = 'col'
    col.dataset.projId = p.id
    col.setAttribute('draggable', 'true')
    col.innerHTML = `
      <div class="col-header">
        <button class="drag-handle" title="拖曳排序">⠿</button>
        <div class="col-dot" style="background:${p.color}"></div>
        <div class="col-title" onclick="openProjectModal(${p.id})">${esc(p.name)}</div>
        <span class="col-count">${p.cards.length}</span>
        <div class="col-actions">
          <button class="icon-btn" title="編輯" onclick="openProjectModal(${p.id})">✎</button>
        </div>
      </div>
      <div class="col-body" id="col-${p.id}">
        ${p.cards.map(c => cardHTML(c)).join('')}
      </div>
      <button class="add-card-btn" onclick="openCardModal(${p.id})">＋ 新增更新</button>
    `
    board.appendChild(col)
  })

  // Add project column
  const addCol = document.createElement('div')
  addCol.className = 'add-col'
  addCol.innerHTML = `<button class="add-col-btn" onclick="openProjectModal()">＋ 新增專案欄</button>`
  board.appendChild(addCol)

  initDragDrop()
  updateFooter()
}

function updateFooter() {
  const pending = state.projects.reduce((sum, p) =>
    sum + p.cards.filter(c => c.status === 'pending').length, 0)
  document.getElementById('pendingBadge').textContent = `🟡 待處理 ${pending}`
}

// ── Drag & Drop ──────────────────────────────────────────────
let dragSrcIdx = null

function initDragDrop() {
  const board = document.getElementById('board')
  const cols = [...board.querySelectorAll('.col')]

  cols.forEach(col => {
    col.addEventListener('dragstart', e => {
      // Block drag if starting from card or action buttons
      if (e.target.closest('.card') || e.target.closest('.add-card-btn') ||
          e.target.closest('.icon-btn') || e.target.closest('.col-title')) {
        e.preventDefault()
        return
      }
      dragSrcIdx = state.projects.findIndex(p => p.id === parseInt(col.dataset.projId))
      e.dataTransfer.effectAllowed = 'move'
      e.dataTransfer.setData('text/plain', dragSrcIdx)
      // Delay adding class so ghost image still looks normal
      requestAnimationFrame(() => col.classList.add('dragging'))
    })

    col.addEventListener('dragend', () => {
      col.classList.remove('dragging')
      board.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'))
      dragSrcIdx = null
    })

    col.addEventListener('dragover', e => {
      e.preventDefault()
      e.dataTransfer.dropEffect = 'move'
      board.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'))
      if (dragSrcIdx !== null) col.classList.add('drag-over')
    })

    col.addEventListener('dragleave', e => {
      // Only remove if leaving the col entirely (not a child)
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over')
    })

    col.addEventListener('drop', e => {
      e.preventDefault()
      col.classList.remove('drag-over')
      const targetIdx = state.projects.findIndex(p => p.id === parseInt(col.dataset.projId))
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return
      // Reorder in state and persist
      const [moved] = state.projects.splice(dragSrcIdx, 1)
      state.projects.splice(targetIdx, 0, moved)
      dragSrcIdx = null
      saveOrder()
      render()
    })
  })
}

function cardHTML(c) {
  const labels = { active:'進行中', pending:'待處理', done:'完成', blocked:'卡住了', archived:'封存' }
  const date = c.updated_at.slice(0,10)
  const memo = c.memo ? `<div class="card-memo">${esc(c.memo)}</div>` : ''
  return `
    <div class="card" onclick="openCardModal(${c.project_id}, ${c.id})">
      <div class="card-title">${esc(c.title)}</div>
      <div class="card-meta">
        <span class="card-status status-${c.status}">${labels[c.status] || c.status}</span>
        <span class="card-time">${date}</span>
      </div>
      ${memo}
    </div>`
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Project Modal ───────────────────────────────────────────
function openProjectModal(id) {
  editing = { type: 'project', id: id || null }
  const p = id ? state.projects.find(x => x.id === id) : null

  document.getElementById('projectModalTitle').textContent = p ? '編輯專案' : '新增專案'
  document.getElementById('projectName').value = p?.name || ''
  document.getElementById('deleteProjectBtn').classList.toggle('hidden', !p)

  // color picker
  const cr = document.getElementById('colorRow')
  cr.innerHTML = COLORS.map(c => `
    <div class="color-opt ${(p?.color||'#6366f1')===c?'selected':''}"
         style="background:${c}" data-color="${c}"
         onclick="selectColor(this)"></div>
  `).join('')

  document.getElementById('projectModal').classList.remove('hidden')
  setTimeout(() => document.getElementById('projectName').focus(), 50)
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'))
  el.classList.add('selected')
}

async function saveProject() {
  const name = document.getElementById('projectName').value.trim()
  const color = document.querySelector('.color-opt.selected')?.dataset.color || '#6366f1'
  if (!name) return toast('請輸入專案名稱')
  try {
    if (editing.id) {
      await api('PUT', `/projects/${editing.id}`, { name, color })
    } else {
      await api('POST', '/projects', { name, color })
    }
    closeModal('projectModal')
    load()
  } catch(e) { toast(e.message) }
}

async function deleteCurrentProject() {
  if (!confirm('確定刪除這個專案和所有卡片？')) return
  await api('DELETE', `/projects/${editing.id}`)
  closeModal('projectModal')
  load()
}

// ── Card Modal ──────────────────────────────────────────────
function openCardModal(projectId, cardId) {
  editing = { type: 'card', id: cardId || null, projectId }
  const proj = state.projects.find(p => p.id === projectId)
  const card = cardId ? proj?.cards.find(c => c.id === cardId) : null

  document.getElementById('cardModalTitle').textContent = card ? '編輯狀態更新' : `新增更新 — ${proj?.name}`
  document.getElementById('cardTitle').value = card?.title || ''
  document.getElementById('cardMemo').value = card?.memo || ''
  document.getElementById('cardStatus').value = card?.status || 'active'
  document.getElementById('deleteCardBtn').classList.toggle('hidden', !card)

  document.getElementById('cardModal').classList.remove('hidden')
  setTimeout(() => document.getElementById('cardTitle').focus(), 50)
}

async function saveCard() {
  const title = document.getElementById('cardTitle').value.trim()
  const memo  = document.getElementById('cardMemo').value.trim()
  const status = document.getElementById('cardStatus').value
  if (!title) return toast('請輸入標題')
  try {
    if (editing.id) {
      await api('PUT', `/cards/${editing.id}`, { title, memo, status })
    } else {
      await api('POST', `/projects/${editing.projectId}/cards`, { title, memo, status })
    }
    closeModal('cardModal')
    load()
  } catch(e) { toast(e.message) }
}

async function deleteCurrentCard() {
  if (!confirm('確定刪除這張卡片？')) return
  await api('DELETE', `/cards/${editing.id}`)
  closeModal('cardModal')
  load()
}

// ── Utils ───────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.add('hidden')
}

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden') })
})

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(el => el.classList.add('hidden'))
})

let toastTimer
function toast(msg) {
  clearTimeout(toastTimer)
  const t = document.querySelector('.toast') || (() => { const d = document.createElement('div'); d.className = 'toast'; document.body.appendChild(d); return d })()
  t.textContent = msg
  t.style.display = 'block'
  toastTimer = setTimeout(() => t.style.display = 'none', 2500)
}

// init
load()
</script>
</body>
</html>
