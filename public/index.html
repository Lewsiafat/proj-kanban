<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── tokens ───────────────────────────────────────────────── */
:root {
  --font-display: 'Fraunces', Georgia, serif;
  --font-sans: 'Geist', -apple-system, system-ui, sans-serif;
  --accent: #cf7a4b;
  --accent-ink: #ffffff;
  --st-progress: #8b7fd1;
  --st-pending:  #d99a3c;
  --st-done:     #6fa86b;
  --st-stuck:    #d9705e;
  --st-archived: #a89c8a;
  --r-card: 12px;
  --r-pill: 999px;
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
}
[data-theme="notebook"] {
  --bg: #f4ecdd; --bg-tex: #efe5d2; --col-bg: #ece1ce;
  --card: #fffdf7; --card-hi: #fffefb;
  --ink-0: #312a20; --ink-1: #5e5546; --ink-2: #8d8473; --ink-3: #b3a890;
  --line: #e3d6bf; --line-strong: #d3c2a4;
  --shadow-card: 0 1px 2px rgba(80,60,30,.05), 0 2px 8px rgba(80,60,30,.04);
  --shadow-lift: 0 8px 24px -6px rgba(80,60,30,.18), 0 2px 6px rgba(80,60,30,.10);
  --r-card: 10px; --wave: 0;
}
[data-theme="cozy"] {
  --bg: #fcefe3; --bg-tex: #f9e7d6; --col-bg: #fbe6d4;
  --card: #fffaf3; --card-hi: #fffefb;
  --ink-0: #3c2c20; --ink-1: #6d5848; --ink-2: #a08873; --ink-3: #c7ad95;
  --line: #f1ddc8; --line-strong: #ecc9a9;
  --shadow-card: 0 2px 4px rgba(190,120,60,.07), 0 4px 14px rgba(190,120,60,.06);
  --shadow-lift: 0 12px 30px -6px rgba(190,110,50,.22), 0 3px 8px rgba(190,110,50,.12);
  --r-card: 16px; --wave: 1;
}

/* ── reset & base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink-0);
  font-family: var(--font-sans); font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body.papered {
  background-image: radial-gradient(circle at 50% 50%, rgba(150,110,60,.04) 0.5px, transparent 0.6px);
  background-size: 6px 6px;
}
::selection { background: color-mix(in oklab, var(--accent) 30%, transparent); }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb {
  background: var(--line-strong); border-radius: 999px;
  border: 3px solid transparent; background-clip: content-box;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 500; letter-spacing: -.01em; }

/* ── layout ───────────────────────────────────────────────── */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ── topbar ───────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; gap: 16px 20px; flex-wrap: wrap;
  padding: 16px 28px; border-bottom: 1px solid var(--line);
  background: color-mix(in oklab, var(--bg) 70%, var(--card));
  position: sticky; top: 0; z-index: 20; backdrop-filter: blur(6px);
}
.brand { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.brand-mark {
  width: 34px; height: 34px; display: grid; place-items: center;
  background: var(--accent); color: var(--accent-ink);
  border-radius: 10px; font-size: 18px; box-shadow: var(--shadow-card);
  transform: rotate(-4deg); flex-shrink: 0;
}
[data-theme="cozy"] .brand-mark { border-radius: 13px; transform: rotate(-6deg); }
.brand-title { font-family: var(--font-display); font-size: 21px; font-weight: 500; letter-spacing: -.01em; line-height: 1.05; }
.brand-sub { font-size: 11px; color: var(--ink-2); font-weight: 500; letter-spacing: .02em; }
.topbar-spacer { flex: 1 1 0; min-width: 0; }
.topbar-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.legend { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; flex-shrink: 1; }
.legend-chip {
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  height: 30px; padding: 0 12px 0 10px; border-radius: 999px;
  border: 1px solid var(--line-strong); background: var(--card);
  font-size: 13px; font-weight: 500; color: var(--ink-1);
  cursor: pointer; transition: all 140ms var(--ease); font-family: var(--font-sans);
}
.legend-chip:hover { border-color: var(--ink-3); color: var(--ink-0); }
.legend-chip.on { background: var(--ink-0); color: var(--bg); border-color: var(--ink-0); }
.count-pill {
  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  height: 30px; padding: 0 12px; border-radius: 999px;
  background: var(--bg-tex); border: 1px solid var(--line);
  font-size: 12px; font-weight: 600; color: var(--ink-1);
}
.ver { font-size: 11px; color: var(--ink-3); font-weight: 500; }

/* ── buttons ──────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 38px; padding: 0 16px; border-radius: 10px;
  border: 1px solid var(--line-strong); background: var(--card); color: var(--ink-0);
  font-family: var(--font-sans); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 140ms var(--ease); box-shadow: var(--shadow-card);
  white-space: nowrap;
}
[data-theme="cozy"] .btn { border-radius: 13px; }
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lift); border-color: var(--ink-3); }
.btn:active { transform: translateY(0) scale(.99); }
.btn.primary { background: var(--accent); color: var(--accent-ink); border-color: color-mix(in oklab, var(--accent) 80%, #000 10%); font-weight: 600; }
.btn.primary:hover { background: color-mix(in oklab, var(--accent) 88%, #fff 12%); }
.btn.ghost { background: transparent; border-color: transparent; box-shadow: none; color: var(--ink-1); }
.btn.ghost:hover { background: color-mix(in oklab, var(--ink-2) 12%, transparent); box-shadow: none; transform: none; }
.btn.danger { color: var(--st-stuck); border-color: transparent; background: transparent; box-shadow: none; }
.btn.danger:hover { background: color-mix(in oklab, var(--st-stuck) 14%, transparent); box-shadow: none; transform: none; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 10px;
  border: 1px solid transparent; background: transparent;
  color: var(--ink-2); cursor: pointer; font-size: 15px;
  transition: all 140ms var(--ease); font-family: var(--font-sans);
}
.icon-btn:hover { background: var(--bg-tex); color: var(--ink-0); }

/* ── fields / inputs ──────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 7px; }
.label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-2); }
.input, .textarea, .select {
  width: 100%; font-family: var(--font-sans); font-size: 14px; color: var(--ink-0);
  background: var(--bg-tex); border: 1px solid var(--line-strong);
  border-radius: 10px; padding: 10px 12px; outline: none;
  transition: border-color 140ms var(--ease), box-shadow 140ms var(--ease);
}
.textarea { resize: vertical; min-height: 84px; line-height: 1.55; }
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
}
.input::placeholder, .textarea::placeholder { color: var(--ink-3); }

/* ── board ────────────────────────────────────────────────── */
.board {
  flex: 1; display: flex; gap: 18px;
  padding: 24px 28px 40px; overflow-x: auto; align-items: flex-start;
}
.col {
  flex: 1 1 0; min-width: 264px; max-width: 360px;
  background: var(--col-bg); border: 1px solid var(--line); border-radius: 16px;
  padding: 12px; display: flex; flex-direction: column;
  max-height: calc(100vh - 132px);
  transition: background 160ms var(--ease), border-color 160ms var(--ease), box-shadow 160ms var(--ease);
}
[data-theme="cozy"] .col { border-radius: 22px; }
.col.col-over {
  border-color: var(--accent);
  background: color-mix(in oklab, var(--accent) 8%, var(--col-bg));
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent);
}
.col-head {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 8px 12px; border-bottom: 1px solid var(--line-strong); margin-bottom: 10px;
}
.col-emoji { font-size: 15px; }
.col-name { font-weight: 600; font-size: 14.5px; color: var(--ink-0); }
.col-name .en { font-size: 10.5px; color: var(--ink-2); margin-left: 6px; font-weight: 500; }
.col-count {
  margin-left: auto; min-width: 24px; height: 24px; padding: 0 7px;
  display: inline-grid; place-items: center; border-radius: 999px;
  background: color-mix(in oklab, var(--st) 22%, var(--card));
  color: color-mix(in oklab, var(--st) 60%, var(--ink-0));
  font-size: 12px; font-weight: 700;
}
.col-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding: 2px; }

/* ── card ─────────────────────────────────────────────────── */
.kard {
  position: relative; display: flex;
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--r-card); box-shadow: var(--shadow-card);
  cursor: grab; overflow: hidden;
  transition: transform 150ms var(--ease), box-shadow 150ms var(--ease), border-color 150ms var(--ease);
  list-style: none;
}
.kard:hover {
  transform: translateY(-2px) rotate(calc(var(--wave) * var(--tilt)));
  box-shadow: var(--shadow-lift); border-color: var(--line-strong);
}
.kard:active { cursor: grabbing; }
.kard.dragging { opacity: 0.4; }
.kard-accent { width: 4px; flex-shrink: 0; }
.kard-body { padding: 12px 14px; flex: 1; min-width: 0; }
.kard-proj { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--ink-2); font-weight: 500; }
.kard-title { font-family: var(--font-display); font-weight: 500; font-size: 16px; line-height: 1.3; color: var(--ink-0); margin: 7px 0 0; }
.kard-memo { font-size: 13px; line-height: 1.5; color: var(--ink-1); margin: 6px 0 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.kard-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 11px; }
.kard-time { font-size: 11px; color: var(--ink-3); font-weight: 500; }
.kard-grip { color: var(--ink-3); font-size: 11px; letter-spacing: -1px; opacity: 0; transition: opacity 140ms var(--ease); }
.kard:hover .kard-grip { opacity: 0.7; }

.col-empty { text-align: center; font-size: 12px; color: var(--ink-3); padding: 18px 8px; border: 1px dashed var(--line-strong); border-radius: 10px; }
.col-add {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px; margin-top: 2px;
  border: 1px dashed var(--line-strong); border-radius: 10px;
  background: transparent; color: var(--ink-2);
  font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 140ms var(--ease);
}
.col-add:hover { background: var(--card); color: var(--ink-0); border-color: var(--ink-3); border-style: solid; }

/* ── modal ────────────────────────────────────────────────── */
.scrim {
  position: fixed; inset: 0; z-index: 60;
  background: color-mix(in oklab, var(--ink-0) 38%, transparent);
  backdrop-filter: blur(3px); display: grid; place-items: center;
  padding: 24px; animation: fade 160ms var(--ease);
}
.modal {
  width: 100%; max-width: 480px; background: var(--bg);
  border: 1px solid var(--line-strong); border-radius: 18px;
  box-shadow: var(--shadow-lift); overflow: hidden; animation: pop 200ms var(--ease);
}
[data-theme="cozy"] .modal { border-radius: 24px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px 16px; }
.modal-title { font-size: 22px; font-weight: 500; }
.modal-title .en { font-size: 13px; color: var(--ink-2); font-weight: 500; margin-left: 8px; font-family: var(--font-sans); font-style: normal; }
.modal-body { padding: 4px 22px 8px; display: flex; flex-direction: column; gap: 16px; }
.modal-foot { display: flex; align-items: center; gap: 10px; padding: 18px 22px 20px; margin-top: 8px; }
.modal-foot .spacer { flex: 1; }

/* status picker */
.status-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.status-opt {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 4px; border-radius: 12px;
  border: 1px solid var(--line-strong); background: var(--card);
  cursor: pointer; transition: all 140ms var(--ease); font-family: var(--font-sans);
}
.status-opt .e { font-size: 18px; }
.status-opt .t { font-size: 11px; font-weight: 600; color: var(--ink-1); }
.status-opt:hover { border-color: var(--ink-3); transform: translateY(-1px); }
.status-opt.on { border-color: var(--st); background: color-mix(in oklab, var(--st) 16%, var(--card)); box-shadow: 0 0 0 2px color-mix(in oklab, var(--st) 30%, transparent); }

/* color picker */
.color-grid { display: flex; gap: 9px; flex-wrap: wrap; }
.color-opt {
  width: 30px; height: 30px; border-radius: 999px; cursor: pointer;
  border: 2px solid transparent; transition: transform 120ms var(--ease);
}
.color-opt:hover { transform: scale(1.12); }
.color-opt.on { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--ink-0); }

/* theme toggle */
.theme-toggle {
  display: flex; gap: 6px; align-items: center;
  font-size: 12px; color: var(--ink-2); font-weight: 500;
}
.theme-toggle button {
  height: 28px; padding: 0 12px; border-radius: 999px;
  border: 1px solid var(--line-strong); background: var(--card); color: var(--ink-1);
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font-sans);
  transition: all 120ms var(--ease);
}
.theme-toggle button.on { background: var(--ink-0); color: var(--bg); border-color: var(--ink-0); }

@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

/* wave underline for cozy */
[data-theme="cozy"] .wave-underline { position: relative; }
[data-theme="cozy"] .wave-underline::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -7px; height: 6px;
  background: var(--accent);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='6' viewBox='0 0 40 6'><path d='M0 3 Q5 0 10 3 T20 3 T30 3 T40 3' fill='none' stroke='black' stroke-width='2'/></svg>") repeat-x;
  mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='6' viewBox='0 0 40 6'><path d='M0 3 Q5 0 10 3 T20 3 T30 3 T40 3' fill='none' stroke='black' stroke-width='2'/></svg>") repeat-x;
  -webkit-mask-size: 28px 6px; mask-size: 28px 6px; opacity: .85;
}

.dot {
  display: inline-block; border-radius: 999px; flex-shrink: 0;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const BASE = window.location.pathname.replace(/\/$/, '');
const API  = BASE + '/api';

/* ── status definitions ───────────────────────────────────── */
const STATUSES = [
  { key: 'pending',  db: 'pending',  zh: '待處理', en: 'pending',     emoji: '🟡', color: 'var(--st-pending)'  },
  { key: 'progress', db: 'active',   zh: '進行中', en: 'in progress', emoji: '🟣', color: 'var(--st-progress)' },
  { key: 'stuck',    db: 'blocked',  zh: '卡住了', en: 'stuck',       emoji: '🔴', color: 'var(--st-stuck)'    },
  { key: 'done',     db: 'done',     zh: '完成',   en: 'done',        emoji: '🟢', color: 'var(--st-done)'     },
  { key: 'archived', db: 'archived', zh: '封存',   en: 'archived',    emoji: '⚪', color: 'var(--st-archived)' },
];
const dbToKey = Object.fromEntries(STATUSES.map(s => [s.db, s.key]));
const keyToDb = Object.fromEntries(STATUSES.map(s => [s.key, s.db]));
const STATUS_BY_KEY = Object.fromEntries(STATUSES.map(s => [s.key, s]));

const PROJECT_COLORS = [
  '#cf7a4b','#d4a24a','#7fa06a','#6f93b0',
  '#a47bb0','#cf7e8e','#5fa293','#b8795c',
];

/* ── api helpers ──────────────────────────────────────────── */
async function apiFetch(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error((await res.json()).error || 'Error');
  return res.json();
}

/* ── time formatter ───────────────────────────────────────── */
function relTime(iso) {
  const d = new Date(iso);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return '剛剛';
  if (diff < 3600) return `${Math.floor(diff/60)} 分鐘前`;
  if (diff < 86400) return `${Math.floor(diff/3600)} 小時前`;
  if (diff < 172800) return '昨天';
  return d.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
}

/* ── ProjectDot ───────────────────────────────────────────── */
const ProjectDot = ({ color, size = 10 }) => (
  <span className="dot" style={{
    width: size, height: size, background: color,
    boxShadow: `0 0 0 3px color-mix(in oklab, ${color} 20%, transparent)`,
  }} />
);

/* ── Card ─────────────────────────────────────────────────── */
const Card = ({ card, project, onEdit, onDragStart, onDragEnd, dragging }) => {
  const tilt = ((card.id * 37) % 5 - 2) * 0.18;
  return (
    <div
      className={`kard${dragging ? ' dragging' : ''}`}
      draggable
      onDragStart={e => onDragStart(e, card.id)}
      onDragEnd={onDragEnd}
      onClick={() => onEdit(card)}
      style={{ '--tilt': `${tilt}deg` }}
    >
      <div className="kard-accent" style={{ background: project.color }} />
      <div className="kard-body">
        <div className="kard-proj">
          <ProjectDot color={project.color} size={9} />
          <span style={{ marginLeft: 2 }}>{project.name}</span>
        </div>
        <h3 className="kard-title">{card.title}</h3>
        {card.memo && <p className="kard-memo">{card.memo}</p>}
        <div className="kard-foot">
          <span className="kard-time">🕓 {relTime(card.updated_at)}</span>
          <span className="kard-grip" aria-hidden>⋮⋮</span>
        </div>
      </div>
    </div>
  );
};

/* ── Column ───────────────────────────────────────────────── */
const Column = ({ status, cards, projects, filter, onEdit, onAdd, drag }) => {
  const [over, setOver] = useState(false);
  const shown = cards.filter(c =>
    dbToKey[c.status] === status.key && (!filter || c.project_id === filter)
  );
  return (
    <section
      className={`col${over ? ' col-over' : ''}`}
      style={{ '--st': status.color }}
      onDragOver={e => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={e => { e.preventDefault(); setOver(false); drag.onDrop(status); }}
    >
      <header className="col-head">
        <span className="col-emoji">{status.emoji}</span>
        <span className="col-name">{status.zh}<span className="en">{status.en}</span></span>
        <span className="col-count">{shown.length}</span>
      </header>
      <div className="col-list">
        {shown.map(c => (
          <Card
            key={c.id} card={c}
            project={projects.find(p => p.id === c.project_id) || projects[0] || { name: '?', color: '#aaa' }}
            onEdit={onEdit}
            onDragStart={drag.onDragStart} onDragEnd={drag.onDragEnd}
            dragging={drag.id === c.id}
          />
        ))}
        {shown.length === 0 && <div className="col-empty">還沒有備忘 · drop here</div>}
        <button className="col-add" onClick={() => onAdd(status.key)}>＋ 新增備忘</button>
      </div>
    </section>
  );
};

/* ── Modal shell ──────────────────────────────────────────── */
const Modal = ({ title, titleEn, onClose, children, footer }) => {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="scrim" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal>
        <div className="modal-head">
          <h2 className="modal-title wave-underline">
            {title}<span className="en">{titleEn}</span>
          </h2>
          <button className="icon-btn" onClick={onClose} aria-label="close">✕</button>
        </div>
        <div className="modal-body">{children}</div>
        <div className="modal-foot">{footer}</div>
      </div>
    </div>
  );
};

/* ── MemoModal ────────────────────────────────────────────── */
const MemoModal = ({ card, projects, onClose, onSave, onDelete }) => {
  const [draft, setDraft] = useState({
    ...card,
    _statusKey: dbToKey[card.status] || 'pending',
  });
  const set = (k, v) => setDraft(d => ({ ...d, [k]: v }));
  const isNew = !draft.id;

  return (
    <Modal
      title={isNew ? '新增備忘' : '編輯備忘'}
      titleEn={isNew ? 'new memo' : 'edit memo'}
      onClose={onClose}
      footer={<>
        {!isNew && <button className="btn danger" onClick={() => onDelete(draft.id)}>刪除</button>}
        <span className="spacer" />
        <button className="btn ghost" onClick={onClose}>取消</button>
        <button className="btn primary" onClick={() => {
          if (!draft.title.trim()) return;
          onSave({ ...draft, status: keyToDb[draft._statusKey] });
        }}>儲存</button>
      </>}
    >
      <div className="field">
        <label className="label">標題 title</label>
        <input className="input" autoFocus value={draft.title}
               placeholder="這次要記什麼？"
               onChange={e => set('title', e.target.value)} />
      </div>
      <div className="field">
        <label className="label">備忘 memo</label>
        <textarea className="textarea" value={draft.memo || ''}
                  placeholder="多寫一點，未來的你會感謝你 :)"
                  onChange={e => set('memo', e.target.value)} />
      </div>
      <div className="field">
        <label className="label">專案 project</label>
        <div className="color-grid" style={{ flexWrap: 'wrap', gap: 6 }}>
          {projects.map(p => (
            <button key={p.id} className={`legend-chip${draft.project_id === p.id ? ' on' : ''}`}
                    onClick={() => set('project_id', p.id)}>
              <ProjectDot color={p.color} size={9} />
              {p.name}
            </button>
          ))}
        </div>
      </div>
      <div className="field">
        <label className="label">狀態 status</label>
        <div className="status-grid">
          {STATUSES.map(s => (
            <button key={s.key} className={`status-opt${draft._statusKey === s.key ? ' on' : ''}`}
                    style={{ '--st': s.color }} onClick={() => set('_statusKey', s.key)}>
              <span className="e">{s.emoji}</span>
              <span className="t">{s.zh}</span>
            </button>
          ))}
        </div>
      </div>
    </Modal>
  );
};

/* ── ProjectModal ─────────────────────────────────────────── */
const ProjectModal = ({ proj, onClose, onSave, onDelete }) => {
  const [draft, setDraft] = useState(proj);
  const set = (k, v) => setDraft(d => ({ ...d, [k]: v }));
  const isNew = !draft.id;

  return (
    <Modal
      title={isNew ? '新增專案' : '編輯專案'}
      titleEn={isNew ? 'new project' : 'edit project'}
      onClose={onClose}
      footer={<>
        {!isNew && <button className="btn danger" onClick={() => onDelete(draft.id)}>刪除</button>}
        <span className="spacer" />
        <button className="btn ghost" onClick={onClose}>取消</button>
        <button className="btn primary" onClick={() => {
          if (!draft.name.trim()) return;
          onSave(draft);
        }}>儲存</button>
      </>}
    >
      <div className="field">
        <label className="label">專案名稱 name</label>
        <input className="input" autoFocus value={draft.name}
               placeholder="例如：個人網站"
               onChange={e => set('name', e.target.value)} />
      </div>
      <div className="field">
        <label className="label">顏色 color</label>
        <div className="color-grid">
          {PROJECT_COLORS.map(c => (
            <button key={c} className={`color-opt${draft.color === c ? ' on' : ''}`}
                    style={{ background: c }} onClick={() => set('color', c)} aria-label={c} />
          ))}
        </div>
      </div>
    </Modal>
  );
};

/* ── App ──────────────────────────────────────────────────── */
function App() {
  const [projects, setProjects] = useState([]);
  const [cards, setCards] = useState([]);
  const [filter, setFilter] = useState(null);
  const [modal, setModal] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem('kanban-theme') || 'notebook');
  const [loading, setLoading] = useState(true);

  /* paper grain */
  useEffect(() => {
    document.body.classList.add('papered');
    return () => document.body.classList.remove('papered');
  }, []);

  /* save theme */
  useEffect(() => { localStorage.setItem('kanban-theme', theme); }, [theme]);

  /* load data */
  const load = useCallback(async () => {
    const raw = await apiFetch('GET', '/projects');
    const allCards = raw.flatMap(p => p.cards.map(c => ({ ...c, project_id: c.project_id ?? p.id })));
    setProjects(raw.map(({ cards: _, ...p }) => p));
    setCards(allCards);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  /* drag */
  const drag = {
    id: dragId,
    onDragStart: (e, id) => { setDragId(id); e.dataTransfer.effectAllowed = 'move'; },
    onDragEnd: () => setDragId(null),
    onDrop: async (status) => {
      if (dragId == null) return;
      const newDb = keyToDb[status.key];
      try {
        const updated = await apiFetch('PUT', `/cards/${dragId}`, { status: newDb });
        setCards(cs => cs.map(c => c.id === dragId ? { ...c, status: newDb, updated_at: updated.updated_at } : c));
      } catch {}
      setDragId(null);
    },
  };

  /* card CRUD */
  const openNewMemo = (statusKey) => {
    if (!projects.length) return;
    setModal({ type: 'memo', card: {
      id: null, project_id: projects[0].id,
      status: keyToDb[statusKey || 'pending'], title: '', memo: '',
      updated_at: new Date().toISOString(),
    }});
  };
  const openEditMemo = (card) => setModal({ type: 'memo', card: { ...card } });
  const saveMemo = async (card) => {
    if (card.id == null) {
      const created = await apiFetch('POST', `/projects/${card.project_id}/cards`, {
        title: card.title, memo: card.memo, status: card.status,
      });
      setCards(cs => [...cs, { ...created, project_id: card.project_id }]);
    } else {
      const updated = await apiFetch('PUT', `/cards/${card.id}`, {
        title: card.title, memo: card.memo,
        status: card.status, project_id: card.project_id,
      });
      setCards(cs => cs.map(c => c.id === card.id ? { ...c, ...updated, project_id: card.project_id } : c));
    }
    setModal(null);
  };
  const deleteMemo = async (id) => {
    await apiFetch('DELETE', `/cards/${id}`);
    setCards(cs => cs.filter(c => c.id !== id));
    setModal(null);
  };

  /* project CRUD */
  const openNewProject = () => setModal({ type: 'project', proj: { id: null, name: '', color: PROJECT_COLORS[0] } });
  const openEditProject = (proj) => setModal({ type: 'project', proj: { ...proj } });
  const saveProject = async (proj) => {
    if (proj.id == null) {
      const created = await apiFetch('POST', '/projects', { name: proj.name, color: proj.color });
      setProjects(ps => [...ps, created]);
    } else {
      const updated = await apiFetch('PUT', `/projects/${proj.id}`, { name: proj.name, color: proj.color });
      setProjects(ps => ps.map(p => p.id === proj.id ? updated : p));
    }
    setModal(null);
  };
  const deleteProject = async (id) => {
    await apiFetch('DELETE', `/projects/${id}`);
    setProjects(ps => ps.filter(p => p.id !== id));
    setCards(cs => cs.filter(c => c.project_id !== id));
    if (filter === id) setFilter(null);
    setModal(null);
  };

  const pendingCount = cards.filter(c => c.status === 'pending').length;

  if (loading) return (
    <div data-theme={theme} id="app" style={{ display: 'grid', placeItems: 'center', height: '100vh' }}>
      <div style={{ fontFamily: 'var(--font-display)', color: 'var(--ink-2)', fontSize: 18 }}>載入中…</div>
    </div>
  );

  return (
    <div id="app" data-theme={theme} style={{ '--accent': '#cf7a4b' }}>

      {/* topbar */}
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark">📋</div>
          <div>
            <div className="brand-title">Project Kanban</div>
            <div className="brand-sub">我的專案備忘 · my project memos</div>
          </div>
        </div>

        <div className="legend">
          <button className={`legend-chip${filter === null ? ' on' : ''}`} onClick={() => setFilter(null)}>
            全部 <span style={{ fontSize: 10, opacity: .7, marginLeft: 2 }}>all</span>
          </button>
          {projects.map(p => (
            <button key={p.id}
                    className={`legend-chip${filter === p.id ? ' on' : ''}`}
                    onClick={() => setFilter(filter === p.id ? null : p.id)}
                    onDoubleClick={() => openEditProject(p)}>
              <ProjectDot color={p.color} size={9} />
              {p.name}
            </button>
          ))}
        </div>

        <div className="topbar-spacer" />

        <div className="topbar-actions">
          <div className="theme-toggle">
            <button className={theme === 'notebook' ? 'on' : ''} onClick={() => setTheme('notebook')}>📓</button>
            <button className={theme === 'cozy' ? 'on' : ''} onClick={() => setTheme('cozy')}>🧡</button>
          </div>
          <span className="count-pill">🟡 待處理 · {pendingCount}</span>
          <button className="btn" onClick={openNewProject}>＋ 專案</button>
          <button className="btn primary" onClick={() => openNewMemo()}>＋ 備忘</button>
          <span className="ver">v2.0.0</span>
        </div>
      </div>

      {/* board */}
      <div className="board">
        {STATUSES.map(s => (
          <Column key={s.key} status={s} cards={cards} projects={projects}
                  filter={filter} onEdit={openEditMemo} onAdd={openNewMemo} drag={drag} />
        ))}
      </div>

      {/* modals */}
      {modal?.type === 'memo' && (
        <MemoModal card={modal.card} projects={projects}
                   onClose={() => setModal(null)} onSave={saveMemo} onDelete={deleteMemo} />
      )}
      {modal?.type === 'project' && (
        <ProjectModal proj={modal.proj}
                      onClose={() => setModal(null)} onSave={saveProject} onDelete={deleteProject} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
