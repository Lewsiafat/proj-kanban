<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Kanban</title>
<script>
  // Apply persisted/system theme before first paint to avoid a flash.
  (function () {
    var t = localStorage.getItem('kanban-theme')
    if (t !== 'light' && t !== 'dark')
      t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'
    document.documentElement.setAttribute('data-theme', t)
  })()
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #ecebe5;
    --surface:     #ffffff;
    --surface2:    #ffffff;
    --col-bg:      #f6f5f1;
    --col-border:  #e4e2da;
    --border:      #ecebe6;
    --border-st:   #e3e2dd;
    --text:        #1f2421;
    --text2:       #6b7269;
    --accent:      #5c9a7b;
    --accent-hover:#4f8a6c;
    --accent-tint: #eaf1ec;
    --accent-bd:   #bfd8c7;
    --accent-on:   #ffffff;
    --danger:      #c77a6b;
    --ver-bg:      #ecece8;
    --ver-text:    #aeb4ab;
    --scrim:       rgba(31,36,33,.38);
    --shadow-sm:   0 1px 2px rgba(31,36,33,.04), 0 4px 14px rgba(31,36,33,.05);
    --shadow-md:   0 2px 4px rgba(31,36,33,.06), 0 12px 26px rgba(31,36,33,.09);
    --shadow-modal:0 20px 50px rgba(31,36,33,.18);
    --radius:      10px;
    --radius-card: 14px;
    --ease:        cubic-bezier(.2,.8,.2,1);
    --font-body:   'Mulish', 'Noto Sans TC', -apple-system, sans-serif;
    --font-head:   'Mulish', 'Noto Sans TC', -apple-system, sans-serif;
  }

  [data-theme="dark"] {
    --bg:          #101214;
    --surface:     #21252a;
    --surface2:    #272c32;
    --col-bg:      #1a1d21;
    --col-border:  #23262a;
    --border:      #2c3033;
    --border-st:   #2c3033;
    --text:        #ecedeb;
    --text2:       #a2a89f;
    --accent:      #79b596;
    --accent-hover:#8ac4a5;
    --accent-tint: #1e2e25;
    --accent-bd:   #2f5a45;
    --accent-on:   #11231a;
    --danger:      #d98d7e;
    --ver-bg:      #23262a;
    --ver-text:    #7c837b;
    --scrim:       rgba(0,0,0,.6);
    --radius-card: 11px;
    --shadow-sm:   0 1px 2px rgba(0,0,0,.25);
    --shadow-md:   0 2px 4px rgba(0,0,0,.3), 0 12px 26px rgba(0,0,0,.35);
    --shadow-modal:0 20px 50px rgba(0,0,0,.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    transition: background-color .25s var(--ease), color .25s var(--ease);
  }
  [data-theme="dark"] body { background-image: none; }

  /* Header */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in oklab, var(--bg) 70%, var(--surface2));
    backdrop-filter: blur(6px);
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--font-head);
    font-size: 18px; font-weight: 800;
    letter-spacing: -.01em; color: var(--text);
  }
  header h1 span { color: var(--accent); }
  .ver-chip {
    font-size: 10px; font-weight: 700; letter-spacing: .02em;
    color: var(--ver-text); background: var(--ver-bg);
    padding: 2px 6px; border-radius: 5px; align-self: center;
  }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .theme-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border-st); background: var(--surface);
    color: var(--text2); cursor: pointer; font-size: 15px; line-height: 1;
    box-shadow: var(--shadow-sm);
    transition: all 140ms var(--ease);
  }
  .theme-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: var(--text2); }
  .theme-btn:active { transform: translateY(0) scale(.99); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 16px;
    border-radius: 10px;
    border: 1px solid var(--border-st);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 140ms var(--ease);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: var(--text2); }
  .btn:active { transform: translateY(0) scale(.99); }
  .btn-primary { background: var(--accent); color: var(--accent-on); border-color: var(--accent); font-weight: 700; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-ghost { background: transparent; border-color: transparent; box-shadow: none; color: var(--text2); }
  .btn-ghost:hover { background: color-mix(in oklab, var(--text2) 12%, transparent); box-shadow: none; transform: none; }
  .btn-danger { color: var(--danger); border-color: transparent; background: transparent; box-shadow: none; }
  .btn-danger:hover { background: color-mix(in oklab, var(--danger) 12%, transparent); box-shadow: none; transform: none; }
  .btn-sm { height: 30px; padding: 0 12px; font-size: 12px; }
  .view-switch {
    display: inline-flex; gap: 2px; margin-left: 8px;
    background: var(--surface);
    border: 1px solid var(--border-st);
    border-radius: 10px; padding: 2px;
  }
  .view-btn {
    border: none; background: none; cursor: pointer;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    color: var(--text2); padding: 5px 14px; border-radius: 8px;
    transition: all 140ms var(--ease);
  }
  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--accent-tint); color: var(--accent); box-shadow: none; }
  .lang-switch {
    display: inline-flex; gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border-st);
    border-radius: 10px; padding: 2px;
  }
  .lang-btn {
    border: none; background: none; cursor: pointer;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    color: var(--text2); padding: 5px 12px; border-radius: 8px;
    transition: all 140ms var(--ease);
  }
  .lang-btn:hover { color: var(--text); }
  .lang-btn.active { background: var(--accent-tint); color: var(--accent); box-shadow: none; }
  .sort-select {
    height: 34px; padding: 0 10px;
    background: var(--surface);
    border: 1px solid var(--border-st);
    border-radius: 10px;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    color: var(--text2); cursor: pointer;
    transition: all 140ms var(--ease);
  }
  .sort-select:hover { color: var(--text); border-color: var(--text2); }

  /* Board */
  .board {
    display: flex; gap: 16px;
    padding: 20px 24px 40px;
    overflow-x: auto; flex: 1;
    align-items: flex-start;
  }
  .board::-webkit-scrollbar { height: 8px; }
  .board::-webkit-scrollbar-track { background: transparent; }
  .board::-webkit-scrollbar-thumb { background: var(--border-st); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
  .board::-webkit-scrollbar-thumb:hover { background: var(--text2); background-clip: content-box; }

  /* Column */
  .col {
    min-width: 280px; max-width: 280px;
    background: var(--col-bg);
    border-radius: 14px;
    border: 1px solid var(--col-border);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 108px);
    transition: border-color .15s, box-shadow .15s, background .25s, color .25s;
  }
  .col.dragging { opacity: 0.35; }
  .card.dragging { opacity: 0.4; }
  .col.drag-over {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 6%, var(--surface));
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
  }
  .col-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px 8px;
    flex-shrink: 0;
  }
  .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .col-title {
    font-family: var(--font-head); font-size: 14px; font-weight: 700;
    letter-spacing: -.01em; flex: 1; cursor: pointer; color: var(--text);
  }
  .col-title:hover { color: var(--accent); }
  .col-count {
    font-size: 11px; color: var(--text2);
    background: color-mix(in oklab, var(--text2) 12%, var(--surface2));
    padding: 2px 8px; border-radius: 999px; font-weight: 600;
  }
  .col-actions { display: flex; gap: 4px; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text2); padding: 4px; border-radius: 6px;
    font-size: 14px; line-height: 1;
    transition: all 140ms var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: color-mix(in oklab, var(--text2) 15%, transparent); }
  .drag-handle {
    background: none; border: none; cursor: grab;
    color: var(--text2); padding: 3px 4px; border-radius: 6px;
    font-size: 15px; line-height: 1; user-select: none;
    transition: all 140ms var(--ease);
  }
  .drag-handle:hover { color: var(--text); background: color-mix(in oklab, var(--text2) 15%, transparent); }
  .drag-handle:active { cursor: grabbing; }

  /* Cards */
  .col-body {
    flex: 1; overflow-y: auto;
    padding: 10px; display: flex; flex-direction: column; gap: 8px;
  }
  .col-body::-webkit-scrollbar { width: 5px; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border-st); border-radius: 999px; }
  /* hide scrollbar while the column frame height is animating */
  .col.h-anim .col-body { overflow: hidden; }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 14px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 140ms var(--ease), box-shadow 140ms var(--ease), border-color 140ms var(--ease), background 140ms var(--ease);
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-st);
  }
  /* disable CSS transition while gsap drives the entrance (avoids a 140ms transform tail) */
  .card.anim { transition: none; }
  .card-title {
    font-family: var(--font-head); font-size: 14px; font-weight: 700;
    line-height: 1.3; color: var(--text);
  }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .card-status { font-size: 11.5px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
  .card-time { font-size: 11px; color: var(--text2); margin-left: auto; }
  .card-memo {
    font-size: 12.5px; color: var(--text2); margin-top: 6px;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }

  /* Status badges — theme-aware palette (light defaults + dark overrides) */
  .status-active   { background: rgba(91,141,239,.15);  color: #3b63b5; }
  .status-pending  { background: rgba(224,169,91,.18);  color: #946612; }
  .status-done     { background: rgba(111,168,107,.18); color: #4a7d45; }
  .status-blocked  { background: rgba(232,131,107,.16); color: #b1503a; }
  .status-archived { background: rgba(140,147,139,.16); color: #6b7269; }
  [data-theme="dark"] .status-active   { background: rgba(91,141,239,.22);  color: #9dbcf5; }
  [data-theme="dark"] .status-pending  { background: rgba(224,169,91,.22);  color: #e6c189; }
  [data-theme="dark"] .status-done     { background: rgba(121,181,150,.22); color: #9bd0b4; }
  [data-theme="dark"] .status-blocked  { background: rgba(232,131,107,.22); color: #f0a892; }
  [data-theme="dark"] .status-archived { background: rgba(160,168,159,.20); color: #b6bcb4; }

  /* Status view */
  .col-title-static {
    font-family: var(--font-head); font-size: 14px; font-weight: 700;
    letter-spacing: -.01em; flex: 1; color: var(--text);
  }
  .card-project { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
  .card-project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-project-name { font-size: 11px; font-weight: 700; color: var(--text2); }

  /* Add card btn */
  .add-card-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; margin: 6px 10px 10px;
    border-radius: 8px; border: 1.5px dashed var(--border-st);
    background: none; cursor: pointer; color: var(--text2);
    font-family: var(--font-body); font-size: 12.5px;
    transition: all 140ms var(--ease);
  }
  .add-card-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: color-mix(in oklab, var(--accent) 6%, transparent);
    border-style: solid;
  }

  /* Add column */
  .add-col { min-width: 240px; max-width: 240px; display: flex; align-items: flex-start; padding-top: 2px; }
  .add-col-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border-radius: 16px;
    border: 1.5px dashed var(--border-st);
    background: color-mix(in oklab, var(--surface) 60%, transparent);
    cursor: pointer; color: var(--text2);
    font-family: var(--font-body); font-size: 13px;
    width: 100%;
    transition: all 140ms var(--ease);
  }
  .add-col-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: color-mix(in oklab, var(--accent) 5%, var(--surface));
    border-style: solid;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: var(--scrim);
    backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    animation: fade 160ms var(--ease);
  }
  .modal {
    background: var(--surface2);
    border: 1px solid var(--border-st);
    border-radius: 16px;
    width: 100%; max-width: 440px;
    padding: 24px 26px;
    box-shadow: var(--shadow-modal);
    animation: pop 200ms var(--ease);
  }
  .modal h2 {
    font-family: var(--font-head); font-size: 18px; font-weight: 800;
    margin-bottom: 18px; letter-spacing: -.01em; color: var(--text);
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 11px; color: var(--text2);
    margin-bottom: 7px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-st);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 13px;
    font-size: 14px; font-family: var(--font-body);
    outline: none; resize: vertical;
    transition: border-color 140ms var(--ease), box-shadow 140ms var(--ease);
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
  }
  .form-group input::placeholder, .form-group textarea::placeholder {
    color: color-mix(in oklab, var(--text2) 60%, transparent);
  }
  .form-group textarea { min-height: 90px; line-height: 1.55; }
  .form-group select option { background: var(--surface2); color: var(--text); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .color-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .color-opt {
    width: 28px; height: 28px; border-radius: 8px;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 120ms var(--ease);
  }
  .color-opt:hover { transform: scale(1.1); }
  .color-opt.selected { box-shadow: 0 0 0 2px var(--surface2), 0 0 0 4px var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border-st);
    color: var(--text); padding: 10px 16px;
    border-radius: 10px; font-size: 13px;
    z-index: 200; box-shadow: var(--shadow-md);
    animation: slideUp .2s var(--ease);
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fade   { from { opacity:0; } to { opacity:1; } }
  @keyframes pop    { from { opacity:0; transform:translateY(10px) scale(.98); } to { opacity:1; transform:none; } }

  .hidden { display: none !important; }

  /* Footer */
  footer {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0; font-size: 12px; color: var(--text2);
    background: color-mix(in oklab, var(--bg) 70%, var(--surface2));
  }
  .status-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; line-height: 1.6;
    border: 1px solid transparent; cursor: pointer; user-select: none;
    font-family: var(--font-body);
    transition: all 140ms var(--ease);
  }
  .filter-chip:not(.active) {
    background: color-mix(in oklab, var(--text2) 12%, transparent);
    color: var(--text2);
  }
  .filter-chip:not(.active):hover {
    color: var(--text);
    background: color-mix(in oklab, var(--text2) 20%, transparent);
  }
  .filter-chip.active { box-shadow: 0 0 0 2px color-mix(in oklab, currentColor 30%, transparent); }
  .filter-chip.chip-all.active { background: color-mix(in oklab, var(--accent) 16%, transparent); color: var(--accent); }
  .filter-chip .chip-count { font-variant-numeric: tabular-nums; opacity: .8; }
  .filter-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <h1>📋 Project <span>Kanban</span></h1>
  <span class="ver-chip" id="verChip">__APP_VERSION__</span>
  <div class="view-switch" id="viewSwitch">
    <button class="view-btn" data-view="project" onclick="switchView('project')" data-i18n="nav_view_project">Projects</button>
    <button class="view-btn" data-view="status" onclick="switchView('status')" data-i18n="nav_view_status">Statuses</button>
  </div>
  <select class="sort-select" id="cardSort" onchange="setCardSort(this.value)" data-i18n-title="sort_title" title="Sort cards">
    <option value="default" data-i18n="sort_default">Default</option>
    <option value="updated-desc" data-i18n="sort_updated_desc">Updated (newest first)</option>
    <option value="updated-asc" data-i18n="sort_updated_asc">Updated (oldest first)</option>
    <option value="created-desc" data-i18n="sort_created_desc">Created (newest first)</option>
    <option value="created-asc" data-i18n="sort_created_asc">Created (oldest first)</option>
    <option value="status-asc" data-i18n="sort_status_asc">Status (ascending)</option>
    <option value="status-desc" data-i18n="sort_status_desc">Status (descending)</option>
  </select>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openProjectModal()" data-i18n="btn_new_project">＋ New Project</button>
    <div class="lang-switch" id="langSwitch">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="zh-TW" onclick="setLang('zh-TW')">繁中</button>
    </div>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
  </div>
</header>

<div class="board" id="board"></div>

<footer>
  <span>📋 Project Kanban</span>
  <div class="status-bar" id="statusBar"></div>
</footer>

<!-- Project Modal -->
<div class="modal-overlay hidden" id="projectModal">
  <div class="modal">
    <h2 id="projectModalTitle" data-i18n="modal_project_new">New Project</h2>
    <div class="form-group">
      <label data-i18n="label_project_name">Project name</label>
      <input id="projectName" type="text" placeholder="e.g. MindVault v2" data-i18n-placeholder="ph_project_name" autofocus>
    </div>
    <div class="form-group">
      <label data-i18n="label_color">Color</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('projectModal')" data-i18n="btn_cancel">Cancel</button>
      <button class="btn btn-danger btn-sm hidden" id="deleteProjectBtn" onclick="deleteCurrentProject()" data-i18n="btn_delete">Delete</button>
      <button class="btn btn-primary" onclick="saveProject()" data-i18n="btn_save">Save</button>
    </div>
  </div>
</div>

<!-- Card Modal -->
<div class="modal-overlay hidden" id="cardModal">
  <div class="modal">
    <h2 id="cardModalTitle" data-i18n="modal_card_new">New Status Update</h2>
    <div class="form-group">
      <label data-i18n="label_project">Project</label>
      <select id="cardProject"></select>
    </div>
    <div class="form-group">
      <label data-i18n="label_title">Title</label>
      <input id="cardTitle" type="text" placeholder="e.g. Finish the login module" data-i18n-placeholder="ph_card_title">
    </div>
    <div class="form-group">

let lang = localStorage.getItem('kanban-lang')
if (lang !== 'zh-TW') lang = 'en'   // default English, validate stored value

function t(key) {
  const d = I18N[lang] || I18N.en
  return d[key] != null ? d[key] : (I18N.en[key] != null ? I18N.en[key] : key)
}

function statusLabel(key) {

}

// Set textContent / placeholder / title on every statically-marked element,
// and rebuild the (dynamic) #cardStatus options for the active language.
function applyStaticI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n)

  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {

// Populate #cardStatus from STATUSES; preserve the selected value across rebuilds.
function buildStatusOptions() {

  sel.innerHTML = STATUSES.map(s =>
    `<option value="${s.key}">${s.emoji} ${statusLabel(s.key)}</option>`).join('')

// ── Theme (light | dark) ────────────────────────────────────
// The pre-paint script in <head> already set <html data-theme>; read it back
// as the single source of truth so the attribute and JS state never diverge.
let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'

function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme)
  const btn = document.getElementById('themeToggle')
  if (btn) {
    btn.textContent = theme === 'dark' ? '☀️' : '🌙'
    btn.title = t(theme === 'dark' ? 'theme_to_light' : 'theme_to_dark')

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark'
  localStorage.setItem('kanban-theme', theme)
  applyTheme()

let state = { projects: [] }
let editing = { type: null, id: null, projectId: null }

// ── API helpers ─────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  })
  if (!res.ok) throw new Error((await res.json()).error || 'Error')
  return res.json()
}

// ── Column order (localStorage) ─────────────────────────────
const ORDER_KEY = 'kanban-col-order'

function saveOrder() {
  localStorage.setItem(ORDER_KEY, JSON.stringify(state.projects.map(p => p.id)))
}

function applyOrder(projects) {
  try {
    const order = JSON.parse(localStorage.getItem(ORDER_KEY) || '[]')
    if (!order.length) return projects
    return [
      ...order.map(id => projects.find(p => p.id === id)).filter(Boolean),
      ...projects.filter(p => !order.includes(p.id))   // new projects go to end
    ]
  } catch { return projects }
}

// ── Status filter (localStorage) ────────────────────────────
const FILTER_KEY = 'kanban-status-filter'
let activeStatuses = new Set(loadFilter())

function loadFilter() {
  try { return JSON.parse(localStorage.getItem(FILTER_KEY) || '[]') } catch { return [] }
}

function saveFilter() {
  localStorage.setItem(FILTER_KEY, JSON.stringify([...activeStatuses]))
}

function matchesFilter(c) {
  return activeStatuses.size === 0 || activeStatuses.has(c.status)
}

// ── View (project | status) ─────────────────────────────────
const VIEW_KEY = 'kanban-view'
let currentView = loadView()

function loadView() {
  return localStorage.getItem(VIEW_KEY) === 'status' ? 'status' : 'project'
}

function saveView() {
  localStorage.setItem(VIEW_KEY, currentView)
}

function switchView(view) {
  if (view === currentView) return
  currentView = view
  saveView()
  updateViewSwitch()

  const board = document.getElementById('board')
  const oldCols = [...board.children]            // current columns + the add-col placeholder
  const rerender = () => render({ viewSwitch: true })
  if (window.gsap && oldCols.length) {
    gsap.killTweensOf(oldCols)                   // drop the outgoing fade if a rapid re-toggle interrupts it
    gsap.to(oldCols, {
      opacity: 0, y: -6, duration: .16, stagger: .01, ease: 'power2.out', onComplete: rerender,
    })
  } else {
    rerender()
  }
}

function updateViewSwitch() {
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === currentView)
  })
  // sort dropdown only applies to the project view
  const sortEl = document.getElementById('cardSort')
  if (sortEl) {
    sortEl.classList.toggle('hidden', currentView !== 'project')
    sortEl.value = cardSort
  }
}

// ── Card sort (project view, localStorage) ──────────────────
const CARD_SORT_KEY = 'kanban-card-sort'
const CARD_SORTS = ['default', 'updated-desc', 'updated-asc', 'created-desc', 'created-asc', 'status-asc', 'status-desc']
const STATUS_ORDER = Object.fromEntries(STATUSES.map((s, i) => [s.key, i]))
let cardSort = loadCardSort()

function loadCardSort() {
  const v = localStorage.getItem(CARD_SORT_KEY)
  return CARD_SORTS.includes(v) ? v : 'default'
}

function setCardSort(value) {
  cardSort = CARD_SORTS.includes(value) ? value : 'default'
  localStorage.setItem(CARD_SORT_KEY, cardSort)
  render()
}

// Sort a project's cards by the current cardSort. 'default' keeps the server's
// position,id order. Time fields are 'YYYY-MM-DD HH:MM:SS' strings, so lexical
// compare == chronological; sign flips asc/desc.
function sortCards(cards) {
  if (cardSort === 'default') return cards
  const [field, dir] = cardSort.split('-')
  const sign = dir === 'asc' ? 1 : -1
  const arr = [...cards]
  if (field === 'status') {
    arr.sort((a, b) =>
      sign * ((STATUS_ORDER[a.status] ?? 99) - (STATUS_ORDER[b.status] ?? 99)) || a.position - b.position)
  } else {
    const key = field === 'updated' ? 'updated_at' : 'created_at'
    arr.sort((a, b) => sign * a[key].localeCompare(b[key]))
  }
  return arr
}

// ── Project filter (status view, localStorage) ──────────────
const PROJECT_FILTER_KEY = 'kanban-project-filter'
let activeProjects = new Set(loadProjectFilter())

function loadProjectFilter() {
  try { return JSON.parse(localStorage.getItem(PROJECT_FILTER_KEY) || '[]') } catch { return [] }
}

function saveProjectFilter() {
  localStorage.setItem(PROJECT_FILTER_KEY, JSON.stringify([...activeProjects]))
}

function matchesProjectFilter(c) {
  return activeProjects.size === 0 || activeProjects.has(c.project_id)
}

function toggleProject(id) {
  if (activeProjects.has(id)) activeProjects.delete(id)
  else activeProjects.add(id)
  saveProjectFilter()
  render()
}

function clearProjectFilter() {
  if (activeProjects.size === 0) return
  activeProjects.clear()
  saveProjectFilter()
  render()
}

// ── Load ────────────────────────────────────────────────────
async function load() {
  const raw = await api('GET', '/projects')
  state.projects = applyOrder(raw)
  render()
}

// ── Render ──────────────────────────────────────────────────
function render(opts = {}) {
  const board = document.getElementById('board')
  // capture current column heights so we can animate the frame when card count changes
  const prevColHeights = {}
  board.querySelectorAll('.col').forEach(col => { prevColHeights[col.dataset.colKey] = col.offsetHeight })
  board.innerHTML = ''

  if (currentView === 'status') renderStatusView(board)
  else renderProjectView(board)

  renderStatusBar()

  // A view switch swaps every column at once (project colKeys 'p<id>' vs status
  // colKeys 's-<key>' never overlap), so FLIP has nothing to match. Instead fade
  // the new columns in with a small stagger; skip flipColHeights entirely.
  if (opts.viewSwitch && window.gsap) {
    gsap.from(board.querySelectorAll('.col'), {
      opacity: 0, y: 8, duration: .28, stagger: .03, ease: 'power2.out', clearProps: 'all',
    })
  } else if (!opts.viewSwitch) {
    flipColHeights(board, prevColHeights)
  }
  // The implicit third case — opts.viewSwitch but no gsap — falls through here:
  // the new view is already rendered above, so the columns just appear instantly.
}

// Project view — columns are projects (the original board, behavior unchanged)
function renderProjectView(board) {
  state.projects.forEach(p => {
    const col = document.createElement('div')
    col.className = 'col'
    col.dataset.projId = p.id
    col.dataset.colKey = 'p' + p.id
    col.setAttribute('draggable', 'true')
    col.innerHTML = `
      <div class="col-header">
        <button class="drag-handle" title="${esc(t('title_drag_reorder'))}">⠿</button>
        <div class="col-dot" style="background:${esc(p.color)}"></div>
        <div class="col-title" onclick="openProjectModal(${p.id})">${esc(p.name)}</div>
        <span class="col-count">${p.cards.length}</span>
        <div class="col-actions">
          <button class="icon-btn" title="${esc(t('title_edit'))}" onclick="openProjectModal(${p.id})">✎</button>
        </div>
      </div>
      <div class="col-body" id="col-${p.id}">
        ${sortCards(p.cards.filter(matchesFilter)).map(c => cardHTML(c)).join('')}
      </div>
      <button class="add-card-btn" onclick="openCardModal(${p.id})">${esc(t('btn_add_update'))}</button>
    `
    board.appendChild(col)
  })

  // Add project column
  const addCol = document.createElement('div')
  addCol.className = 'add-col'
  addCol.innerHTML = `<button class="add-col-btn" onclick="openProjectModal()">${esc(t('btn_add_project_col'))}</button>`
  board.appendChild(addCol)

  initDragDrop()
}

// Status view — columns are statuses; cards grouped across all projects
function renderStatusView(board) {
  const byStatus = {}
  STATUSES.forEach(s => { byStatus[s.key] = [] })
  state.projects.forEach(p => p.cards.forEach(c => {
    if (!matchesProjectFilter(c)) return
    if (byStatus[c.status]) byStatus[c.status].push({ card: c, project: p })
  }))

  STATUSES.forEach(s => {
    const items = byStatus[s.key]
    const col = document.createElement('div')
    col.className = 'col'
    col.dataset.status = s.key
    col.dataset.colKey = 's-' + s.key
    col.innerHTML = `
      <div class="col-header">
        <div class="col-title-static">${s.emoji} ${esc(statusLabel(s.key))}</div>
        <span class="col-count status-${s.key}">${items.length}</span>
      </div>
      <div class="col-body" id="status-col-${s.key}">
        ${items.map(it => statusCardHTML(it.card, it.project)).join('')}
      </div>
      <button class="add-card-btn" onclick="openCardModal(null, null, '${s.key}')">${esc(t('btn_add_update'))}</button>
    `
    board.appendChild(col)
  })
  initStatusDragDrop()
}

// Animate each column's outer frame between its old and new height when its
// card count changes (add / delete / filter). Target height is pre-measured.
function flipColHeights(board, prev) {
  if (!window.gsap) return
  const hadColumns = Object.keys(prev).length > 0   // false only on the very first render
  board.querySelectorAll('.col').forEach(col => {
    const from = prev[col.dataset.colKey]
    if (from == null) {
      // colKey absent from prev = a genuinely new column. Animate its entrance,
      // but skip the first load (prev empty) where every column would qualify.
      // (The view-switch path takes the opts.viewSwitch branch and never calls
      // flipColHeights, so it can't double-fire here.)
      if (hadColumns) {
        gsap.from(col, {
          opacity: 0, y: 6, scale: .96, transformOrigin: 'top center',
          duration: .28, ease: 'power2.out', clearProps: 'all',
        })
      }
      return
    }
    const to = col.offsetHeight
    if (Math.abs(from - to) < 2) return  // height unchanged
    col.classList.add('h-anim')
    gsap.fromTo(col,
      { height: from },
      { height: to, duration: .3, ease: 'power2.out', clearProps: 'height',
        onComplete: () => col.classList.remove('h-anim') })
  })
}

function renderStatusBar() {
  if (currentView === 'status') renderProjectChips()
  else renderStatusChips()
}

function renderStatusChips() {
  const counts = {}
  let total = 0
  STATUSES.forEach(s => { counts[s.key] = 0 })
  state.projects.forEach(p => p.cards.forEach(c => {
    total++
    if (counts[c.status] !== undefined) counts[c.status]++
  }))
  const allChip = `
    <button class="filter-chip chip-all ${activeStatuses.size === 0 ? 'active' : ''}"
            onclick="clearFilter()">${esc(t('chip_all'))} <span class="chip-count">${total}</span></button>`
  const statusChips = STATUSES.map(s => `
    <button class="filter-chip status-${s.key} ${activeStatuses.has(s.key) ? 'active' : ''}"
            onclick="toggleStatus('${s.key}')">
      ${s.emoji} ${esc(statusLabel(s.key))} <span class="chip-count">${counts[s.key]}</span>
    </button>`).join('')
  document.getElementById('statusBar').innerHTML = allChip + statusChips
}

function renderProjectChips() {
  let total = 0
  state.projects.forEach(p => { total += p.cards.length })
  const allChip = `
    <button class="filter-chip chip-all ${activeProjects.size === 0 ? 'active' : ''}"
            onclick="clearProjectFilter()">${esc(t('chip_all'))} <span class="chip-count">${total}</span></button>`
  const projChips = state.projects.map(p => {
    const on = activeProjects.has(p.id)
    const style = on
      ? `style="color:${esc(p.color)}; background:color-mix(in oklab, ${esc(p.color)} 14%, transparent)"`
      : ''
    return `
    <button class="filter-chip chip-proj ${on ? 'active' : ''}" ${style}
            onclick="toggleProject(${p.id})">
      <span class="chip-dot" style="background:${esc(p.color)}"></span>${esc(p.name)} <span class="chip-count">${p.cards.length}</span>
    </button>`
  }).join('')
  document.getElementById('statusBar').innerHTML = allChip + projChips
}

// statuses actually shown for a filter set (empty set = all shown)
function visibleSet(set) {
  return set.size === 0 ? new Set(STATUSES.map(s => s.key)) : new Set(set)
}

function toggleStatus(status) {
  const before = new Set(activeStatuses)
  if (activeStatuses.has(status)) activeStatuses.delete(status)
  else activeStatuses.add(status)
  saveFilter()
  applyFilter(before)
}

function clearFilter() {
  if (activeStatuses.size === 0) return
  const before = new Set(activeStatuses)
  activeStatuses.clear()
  saveFilter()
  applyFilter(before)
}

// Animate only the cards whose visibility changed: newly-hidden fade out,
// newly-shown fade in. Cards that stay visible are never touched (no drift).
// Reflow of remaining cards is instant by design (no FLIP).
function applyFilter(before) {
  const board = document.getElementById('board')
  const enteringStatuses = [...visibleSet(activeStatuses)].filter(s => !visibleSet(before).has(s))
  const leavingEls = [...board.querySelectorAll('.card')]
    .filter(el => !matchesFilter({ status: el.dataset.status }))

  const rerender = () => {
    render()
    if (window.gsap && enteringStatuses.length) {
      const enterEls = [...board.querySelectorAll('.card')]
        .filter(el => enteringStatuses.includes(el.dataset.status))
      enterEls.forEach(el => el.classList.add('anim'))
      gsap.from(enterEls, {
        opacity: 0, y: 8, duration: .26, stagger: .02, ease: 'power2.out', clearProps: 'all',
        onComplete: () => enterEls.forEach(el => el.classList.remove('anim')),
      })
    }
  }

  if (window.gsap && leavingEls.length) {
    gsap.to(leavingEls, { opacity: 0, duration: .16, stagger: .015, onComplete: rerender })
  } else {
    rerender()
  }
}

// ── Drag & Drop ──────────────────────────────────────────────
let dragSrcIdx = null

function initDragDrop() {
  const board = document.getElementById('board')
  const cols = [...board.querySelectorAll('.col')]

  cols.forEach(col => {
    col.addEventListener('dragstart', e => {
      // Block drag if starting from card or action buttons
      if (e.target.closest('.card') || e.target.closest('.add-card-btn') ||
          e.target.closest('.icon-btn') || e.target.closest('.col-title')) {
        e.preventDefault()
        return
      }
      dragSrcIdx = state.projects.findIndex(p => p.id === parseInt(col.dataset.projId))
      e.dataTransfer.effectAllowed = 'move'
      e.dataTransfer.setData('text/plain', dragSrcIdx)
      // Delay adding class so ghost image still looks normal
      requestAnimationFrame(() => col.classList.add('dragging'))
    })

    col.addEventListener('dragend', () => {
      col.classList.remove('dragging')
      board.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'))
      dragSrcIdx = null
    })

    col.addEventListener('dragover', e => {
      e.preventDefault()
      e.dataTransfer.dropEffect = 'move'
      board.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'))
      if (dragSrcIdx !== null) col.classList.add('drag-over')
    })

    col.addEventListener('dragleave', e => {
      // Only remove if leaving the col entirely (not a child)
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over')
    })

    col.addEventListener('drop', e => {
      e.preventDefault()
      col.classList.remove('drag-over')
      const targetIdx = state.projects.findIndex(p => p.id === parseInt(col.dataset.projId))
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return
      // Reorder in state and persist
      const [moved] = state.projects.splice(dragSrcIdx, 1)
      state.projects.splice(targetIdx, 0, moved)
      dragSrcIdx = null
      saveOrder()
      render()
    })
  })
}

// Status-view card drag — drop a card on a status column to change its status
let dragCardId = null

function initStatusDragDrop() {
  const board = document.getElementById('board')

  board.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.stopPropagation()
      dragCardId = parseInt(card.dataset.cardId)
      e.dataTransfer.effectAllowed = 'move'
      e.dataTransfer.setData('text/plain', String(dragCardId))
      requestAnimationFrame(() => card.classList.add('dragging'))
    })
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging')
      board.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'))
      dragCardId = null
    })
  })

  board.querySelectorAll('.col').forEach(col => {
    col.addEventListener('dragover', e => {
      if (dragCardId === null) return
      e.preventDefault()
      e.dataTransfer.dropEffect = 'move'
      board.querySelectorAll('.col').forEach(c => c.classList.remove('drag-over'))
      col.classList.add('drag-over')
    })
    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over')
    })
    col.addEventListener('drop', async e => {
      e.preventDefault()
      col.classList.remove('drag-over')
      if (dragCardId === null) return
      const id = dragCardId
      const newStatus = col.dataset.status
      const card = findCard(id)
      dragCardId = null
      if (!card || card.status === newStatus) return
      try {
        await api('PUT', `/cards/${id}`, { status: newStatus })
        load()
      } catch (err) { toast(err.message) }
    })
  })
}

function findCard(id) {
  for (const p of state.projects) {
    const c = p.cards.find(c => c.id === id)
    if (c) return c
  }
  return null
}

function cardHTML(c) {
  const date = c.updated_at.slice(0,10)
  const memo = c.memo ? `<div class="card-memo">${esc(c.memo)}</div>` : ''
  return `
    <div class="card" data-status="${c.status}" onclick="openCardModal(${c.project_id}, ${c.id})">
      <div class="card-title">${esc(c.title)}</div>
      <div class="card-meta">
        <span class="card-status status-${c.status}">${esc(STATUS_ORDER[c.status] != null ? statusLabel(c.status) : c.status)}</span>
        <span class="card-time">${date}</span>
      </div>
      ${memo}
    </div>`
}

function statusCardHTML(c, project) {
  const date = c.updated_at.slice(0,10)
  const memo = c.memo ? `<div class="card-memo">${esc(c.memo)}</div>` : ''
  return `
    <div class="card" draggable="true" data-status="${c.status}" data-card-id="${c.id}"
         onclick="openCardModal(${c.project_id}, ${c.id})">
      <div class="card-project">
        <span class="card-project-dot" style="background:${esc(project.color)}"></span>
        <span class="card-project-name">${esc(project.name)}</span>
      </div>
      <div class="card-title">${esc(c.title)}</div>
      <div class="card-meta">
        <span class="card-time">${date}</span>
      </div>
      ${memo}
    </div>`
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Project Modal ───────────────────────────────────────────
function openProjectModal(id) {
  editing = { type: 'project', id: id || null }
  const p = id ? state.projects.find(x => x.id === id) : null

  document.getElementById('projectModalTitle').textContent = p ? t('modal_project_edit') : t('modal_project_new')
  document.getElementById('projectName').value = p?.name || ''
  document.getElementById('deleteProjectBtn').classList.toggle('hidden', !p)

  // color picker
  const cr = document.getElementById('colorRow')
  const cur = p?.color || '#7FB069'
  // keep a project's existing colour selectable even if it predates the current palette
  const palette = COLORS.includes(cur) ? COLORS : [cur, ...COLORS]
  cr.innerHTML = palette.map(c => `
    <div class="color-opt ${cur===c?'selected':''}"
         style="background:${c}" data-color="${c}"
         onclick="selectColor(this)"></div>
  `).join('')

  document.getElementById('projectModal').classList.remove('hidden')
  setTimeout(() => document.getElementById('projectName').focus(), 50)
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'))
  el.classList.add('selected')
}

async function saveProject() {
  const name = document.getElementById('projectName').value.trim()
  const color = document.querySelector('.color-opt.selected')?.dataset.color || '#7FB069'
  if (!name) return toast(t('toast_need_project_name'))
  try {
    if (editing.id) {
      await api('PUT', `/projects/${editing.id}`, { name, color })
    } else {
      await api('POST', '/projects', { name, color })
    }
    closeModal('projectModal')
    load()
  } catch(e) { toast(e.message) }
}

async function deleteCurrentProject() {
  if (!confirm(t('confirm_delete_project'))) return
  const id = editing.id
  await api('DELETE', `/projects/${id}`)
  closeModal('projectModal')
  // Fade the doomed column out before reloading; the project modal is only
  // reachable in the project view, so this .col is always present.
  const col = document.querySelector(`.col[data-proj-id="${id}"]`)
  if (window.gsap && col) {
    gsap.to(col, { opacity: 0, scale: .96, duration: .2, ease: 'power2.out', onComplete: load })
  } else {
    load()
  }
}

// ── Card Modal ──────────────────────────────────────────────
function openCardModal(projectId, cardId, presetStatus) {
  const proj = state.projects.find(p => p.id === projectId)
  const card = cardId ? proj?.cards.find(c => c.id === cardId) : null
  editing = { type: 'card', id: cardId || null, projectId }

  // project dropdown — list every project
  const sel = document.getElementById('cardProject')
  sel.innerHTML = state.projects.map(p =>
    `<option value="${p.id}">${esc(p.name)}</option>`).join('')
  const preProjId = card ? card.project_id : (projectId ?? state.projects[0]?.id)
  if (preProjId != null) sel.value = String(preProjId)

  document.getElementById('cardModalTitle').textContent = card ? t('modal_card_edit') : t('modal_card_new')
  document.getElementById('cardTitle').value = card?.title || ''
  document.getElementById('cardMemo').value = card?.memo || ''
  document.getElementById('cardStatus').value = card?.status || presetStatus || 'active'
  document.getElementById('deleteCardBtn').classList.toggle('hidden', !card)

  document.getElementById('cardModal').classList.remove('hidden')
  setTimeout(() => document.getElementById('cardTitle').focus(), 50)
}

async function saveCard() {
  const title = document.getElementById('cardTitle').value.trim()
  const memo  = document.getElementById('cardMemo').value.trim()
  const status = document.getElementById('cardStatus').value
  const projectId = parseInt(document.getElementById('cardProject').value)
  if (!title) return toast(t('toast_need_title'))
  if (!projectId) return toast(t('toast_need_project'))
  try {
    if (editing.id) {
      await api('PUT', `/cards/${editing.id}`, { title, memo, status, project_id: projectId })
    } else {
      await api('POST', `/projects/${projectId}/cards`, { title, memo, status })
    }
    closeModal('cardModal')
    load()
  } catch(e) { toast(e.message) }
}

async function deleteCurrentCard() {
  if (!confirm(t('confirm_delete_card'))) return
  await api('DELETE', `/cards/${editing.id}`)
  closeModal('cardModal')
  load()
}

// ── Utils ───────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.add('hidden')
}

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden') })
})

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(el => el.classList.add('hidden'))
})

let toastTimer
function toast(msg) {
  clearTimeout(toastTimer)
  const t = document.querySelector('.toast') || (() => { const d = document.createElement('div'); d.className = 'toast'; document.body.appendChild(d); return d })()
  t.textContent = msg
  t.style.display = 'block'
  toastTimer = setTimeout(() => t.style.display = 'none', 2500)
}

// init
document.documentElement.lang = (lang === 'zh-TW' ? 'zh-Hant' : 'en')
applyStaticI18n()
updateLangSwitch()
updateViewSwitch()
applyTheme()
load()
</script>
